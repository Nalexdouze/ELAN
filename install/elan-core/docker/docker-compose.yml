#      - /data/elan/genstore:/genstore
#    command: ["tail", "-f", "/dev/null"]
#    depends_on:
#      - build-base-heavy
#    logging:
#      driver: journald
#    environment:
#      - TZ=Europe/Paris

  # ============================================
  # APPLICATION LAYER - Interface utilisateur
  # ============================================

  elan-webui:
    build:
      context: .
      dockerfile: Dockerfile-webui
    container_name: elan-webui
    # Interface web d'administration
    network_mode: host
    volumes:
      - ../app/elan-webui.py:/app/elan-webui.py
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
    restart: unless-stopped
    logging:
      driver: journald
    environment:
      - TZ=Europe/Paris
    command: ["python3", "elan-webui.py"]
    depends_on:
      - elan-watchdog
      - elan-samba-share
      - elan-samba-mnt
      - build-base
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

