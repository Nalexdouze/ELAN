#      test: ["CMD-SHELL", "pgrep -f elan-watchdog.py && pgrep cupsd || exit 1"]
#      test: ["CMD-SHELL", "pgrep -f elan-watchdog.py || exit 1"]
#      interval: 60s
#      timeout: 300s
#      retries: 3

