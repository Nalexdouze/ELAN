services:
  # ============================================
  # BUILD LAYER - Gestion des build
  # ============================================
  build-base:
    build:
      context: .
      dockerfile: Dockerfile-base
    image: elan-base
    pull_policy: never
  build-base-heavy:
    build:
      context: .
      dockerfile: Dockerfile-base-heavy
    image: elan-base-heavy
    pull_policy: never
  # ============================================
  # STORAGE LAYER - Gestion des fichiers
  # ============================================
  elan-samba-mnt:
    build:
      context: .
      dockerfile: Dockerfile-samba
    container_name: elan-samba-mnt
    # Monte les partages distants (CIFS client)
    network_mode: host
    cap_add:
      - SYS_ADMIN
    privileged: true
    volumes:
      - ../app/elan-samba-mnt.py:/app/elan-samba-mnt.py
      - ../config/elan-samba-mnt.yml:/config/elan-samba-mnt.yml:ro
      - /data/elan/mounts:/mnts:rshared
    restart: unless-stopped
    logging:
      driver: journald
    environment:
      - TZ=Europe/Paris
    command: ["python3", "elan-samba-mnt.py"]
    depends_on:
      - build-base
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f elan-samba-mnt.py || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3

  elan-samba-share:
    build:
      context: .
      dockerfile: Dockerfile-samba
    container_name: elan-samba-share
    # Expose les partages locaux (SMB server)
    network_mode: host
    volumes:
      - ../app/elan-samba-share.py:/app/elan-samba-share.py
      - ../config/elan-samba-share.yml:/config/elan-samba-share.yml:ro
      - /data/elan/shares:/shares
      - /data/elan/mounts:/mnts:rshared
    restart: unless-stopped
    logging:
      driver: journald
    environment:
      - TZ=Europe/Paris
    command: ["python3", "elan-samba-share.py"]
    depends_on:
      - elan-samba-mnt
      - build-base
    healthcheck:
      test: ["CMD-SHELL", "pgrep smbd || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3


  # ============================================
  # PROCESSING LAYER - Traitement des fichiers
  # ============================================

  elan-watchdog:
    build:
      context: .
      dockerfile: Dockerfile-watchdog
    container_name: elan-watchdog
    # Surveillance des hotfolders
    network_mode: host
    volumes:
      - ../app/elan-watchdog.py:/app/elan-watchdog.py
      - ../config/elan-watchdog.yml:/config/elan-watchdog.yml:ro
      - ../app/actions:/app/actions:ro
      - /data/elan/shares:/shares
      - /data/elan/mounts:/mnts:rshared
      - /data/elan/genstore:/genstore
      - /var/run/cups:/var/run/cups
    restart: unless-stopped
    logging:
      driver: journald
    environment:
      - TZ=Europe/Paris
#      - LOG_LEVEL=DEBUG
    command: ["/bin/bash", "-c", "cupsd && python3 elan-watchdog.py"]
#    command: ["/bin/bash", "-c", "python3 elan-watchdog.py"]
    depends_on:
      - elan-samba-mnt
      - build-base-heavy
#      - elan-pdf-processor
