# ============================================================================
# PRESSES
# ============================================================================
# XEROX
# ============================================================================
  - name: "XEROX Aplat"
    description: "Rasterisation à 600 DPI pour aplat CMJN sur **Xerox Iridesse**"
    folder: /shares/entree/Presses/XEROX Iridesse/Aplat
    patterns: ["*.pdf"]
    actions:
      - type: raster
        params:
          resolution: 600
          output_suffix: "_raster-600"
    destinations: 
      - "/mnts/XEROX-Iridesse/APLAT"

  - name: "XEROX Aplat PMS"
    description: "Rasterisation à 600 DPI pour aplat incluant des tons directs sur **Xerox Iridesse**"
    folder: /shares/entree/Presses/XEROX Iridesse/Aplat PMS
    patterns: ["*.pdf"]
    actions:
      - type: raster
        params:
          resolution: 600
          output_suffix: "_raster-600-spots"
          color_mode: "separated"
    destinations: 
      - "/mnts/XEROX-Iridesse/APLAT"

  - name: "XEROX Brochure"
    description: "Rasterisation à 600 DPI pour brochures sur **Xerox Iridesse**"
    folder: /shares/entree/Presses/XEROX Iridesse/Brochure
    patterns: ["*.pdf"]
    actions:
      - type: raster
        params:
          resolution: 600
          output_suffix: "_raster-600"
    destinations: 
      - "/mnts/XEROX-Iridesse/BROCHURE"

  - name: "XEROX Découpe"
    description: "Rasterisation à 600 DPI pour aplat incluant des tons directs ou calque de découpe sur **Xerox Iridesse**\
                  Envoie de 2 PDF séparant automatiquement les découpes."
    folder: /shares/entree/Presses/XEROX Iridesse/Decoupe
    patterns: ["*.pdf"]
    actions:
      - type: extract_cutting
        params:
          simulation_suffix: "_simulation"
          print_suffix: "_print"
          route_simulation:
            actions:
              - type: raster
                params:
                  resolution: 150
                  output_suffix: "_raster-150"
            destinations:
              - "/shares/sortie/TEST-XEROX-Iridesse/APLAT"
          route_print:
            actions:
              - type: raster
                params:
                  resolution: 600
                  output_suffix: "_raster-600-spots"
                  color_mode: "separated"
            destinations:
              - "/shares/sortie/TEST-XEROX-Iridesse/APLAT"

