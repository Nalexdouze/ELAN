# ============================================================================
# XEROX+HP
# ============================================================================

  - name: "Brochure HP+XEROX - Automatique"
    description: "Séparation automatique de la couverture sur **Xerox Iridesse** sur et de l'intérieur sur **HP Indigo**\
                  Rasterisation à 600 DPI pour **Xerox Iridesse**\
                  Rasterisation à 800 DPI pour **HP Indigo**\
                  Automatiquement envoyé en CMYK et EMP sur **HP Indigo**"
    folder: /shares/entree/Presses/Brochures - XEROX-Couv HP-Interieur
    patterns: ["*.pdf"]
    stability_timeout: 600
    actions:
      - type: saddle_stitch_split
        params:
          cover_pages: "1-2,-2--1"           # Pages 1,2 + pénultième, dernière
          cover_suffix: "_cover"
          inner_suffix: "_inner"
          route_cover:
            actions:
              - type: raster
                params:
                  resolution: 600
                  output_suffix: "_raster-600"
            destinations: 
              - "/mnts/XEROX-Iridesse/BROCHURE"
          route_inner:
            actions:
              - type: adjust_mediabox
                params:
                  margin_mm: 3
                  center_content: true
              - type: raster
                params:
                  resolution: 800
                  output_suffix: "_raster-800"
            destinations: 
              - "/mnts/HP-Indigo-12KVP15K-HD/BROCHURE AUTO ENCARTE"
              - "/mnts/HP-Indigo-12KVP15K-HD/BROCHURE AUTO ENCARTE EPM"

# ============================================================================
# PDF pour BAT
# ============================================================================

# 150 ========================================================================

  - name: "PDF pour BAT RVB-150"
    description: "PDF à usage de BAT\
                  Rasterisation 150 DPI **avec** compression JPEG et conversion RVB, équivalent à un PDF taille minimale.\ 
                  Ajouts des repères visuels de coupe, fond perdu et plis. Ainsi que les côtes des volets en cas de plis.
                  La zone de support est légèrement agrandie pour permet aux indications de format d'être visible."
    folder: /shares/entree/PDF pour BAT/RVB-150
    patterns: ["*.pdf"]
    downloadable: true
    actions:
      - type: adjust_mediabox
        params:
          margin_mm: 12
      - type: raster
        params:
          resolution: 150
          output_format: "jpeg"
          output_color: "rgb"
          jpeg_quality: 75
          output_suffix: "_raster_compressed-150"
      - type: add_trim_guide
    destinations: 
      - "/shares/sortie/PDF pour BAT/RVB-150"

