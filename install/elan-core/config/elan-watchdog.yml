  - name: "Morgana SC7100ProT XL"
    description: "Envoi direct des fichiers de découpe sur ColorCutPro"
    folder: /shares/entree/Decoupe/Morgana SC7100ProT XL - ColorCutPro
    patterns: ["*.jbf", "*.ilm"]
    destinations: 
