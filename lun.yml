# lun.yml
# Configuration du LUN iSCSI pour ELAN

# Adresse IP du NAS/serveur iSCSI
nas_ip: "192.168.1.120"

# IQN du target iSCSI (serveur)
# Format Synology : iqn.2000-01.com.synology:NAS-NAME.TARGET-NAME
iqn_server: "iqn.2000-01.com.synology:NAS-PROD.ELAN"

# IQN de l'initiateur (ce serveur ELAN)
# Cet IQN sera configuré dans /etc/iscsi/initiatorname.iscsi
iqn_host: "iqn.2025-01.elan"

# Point de montage local
mount_path: "/data/elan"

# Type de filesystem (ext4, xfs, etc.)
filesystem: "ext4"